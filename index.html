<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر الإبداع - صفاء المصري</title>
    <script src="https://cdnjs.cloudflare.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        :root { 
            --deep-blue: #003366; 
            --pearl-velvet: #fdfcfb; 
            --gold-sun: rgba(255, 215, 0, 0.5);
            --royal-gold: #D4AF37;
            --sky-blue: #e0f7fa; /* لون أزرق فاتح وناعم للخلفية */
        }
        
        body { 
            font-family: 'Cairo', sans-serif; margin: 0; min-height: 100vh; 
            display: flex; justify-content: center; align-items: center; 
            background: var(--sky-blue); /* تطبيق اللون الأزرق الفاتح */
            overflow: hidden; position: relative;
        }

        /* أشعة الشمس الذهبية التي تغزو المكان */
        .sun-rays {
            position: absolute; top: -150px; right: -150px;
            width: 800px; height: 800px;
            background: radial-gradient(circle, var(--gold-sun) 0%, transparent 70%);
            z-index: 0; animation: sunGlow 6s infinite alternate;
        }
        @keyframes sunGlow { from { opacity: 0.4; transform: scale(1); } to { opacity: 0.9; transform: scale(1.1); } }

        /* الأفاتار البشري الحقيقي - خارج الواجهة */
        .girl-avatar {
            position: absolute; bottom: 30px; left: 40px; width: 200px;
            z-index: 5; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .girl-avatar img { 
            width: 100%; border-radius: 30px; 
            border: 4px solid var(--royal-gold);
            box-shadow: 0 0 25px var(--royal-gold);
        }

        /* الواجهة اللؤلؤية المخملية */
        #dashboard { 
            background: var(--pearl-velvet);
            background-image: linear-gradient(135deg, #ffffff 0%, #e0e0e0 100%);
            width: 92%; max-width: 900px; padding: 40px; 
            border-radius: 45px; border: 5px double var(--royal-gold);
            text-align: center; z-index: 10;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            position: relative; color: #333;
        }

        .question-card { 
            font-size: 1.6rem; margin-bottom: 30px; line-height: 1.8; text-align: right; 
            border-right: 12px solid var(--royal-gold); padding: 35px; 
            background: #fff; border-radius: 20px; color: #222;
            box-shadow: inset 0 0 15px rgba(0,0,0,0.05);
        }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .option-btn { 
            padding: 22px; background: #fff; border: 2px solid #ddd; 
            border-radius: 20px; cursor: pointer; transition: 0.3s; 
            font-weight: bold; color: #444; font-size: 1.15rem;
            font-family: 'Cairo', sans-serif;
        }
        .option-btn:hover { border-color: var(--royal-gold); background: #fffdf0; transform: translateY(-5px); }
        
        .correct { background: rgba(39, 174, 96, 0.8) !important; color: #fff !important; border-color: #2ecc71 !important; }
        .wrong { background: rgba(198, 40, 40, 0.8) !important; color: #fff !important; border-color: #e74c3c !important; }

        .btn-royal { 
            background: linear-gradient(to bottom, var(--royal-gold), #b8860b); 
            color: #fff; padding: 18px 75px; border-radius: 50px; 
            border: none; font-size: 1.3rem; font-weight: bold; cursor: pointer; 
            margin-top: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            font-family: 'Cairo', sans-serif;
        }

        .timer-bar { width: 100%; height: 10px; background: #eee; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        #timer-fill { width: 100%; height: 100%; background: var(--deep-blue); transition: 1s linear; }

        .report-table { width: 100%; border-collapse: collapse; margin-top: 25px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .report-table th, .report-table td { padding: 15px; border: 1px solid #eee; text-align: right; font-size: 0.95rem; color: #333; }
        .report-table th { background: #001f3f; color: white; }

        #quiz-section, #score-section { display: none; }

        @media print { .no-print, .girl-avatar, .sun-rays { display: none !important; } body { background: white; } #dashboard { border: 2px solid #000; box-shadow: none; width: 100%; } .question-card { color: black !important; } }
    </style>
</head>
<body>

    <div class="sun-rays no-print"></div>

    <div class="girl-avatar no-print" id="avatar-box">
        <img id="avatar-img" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/2wCEAAoHBwgHBgoICAgLCgoLDhgQDg0NDh0VFhEYIx8lJCIfIiEmKzcvJyk0KSEiMEExNDk7Pj4+JS5NTzpCTzswPjsBCwsLDw4PHh4eHjsuLjs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7Ozs7O//AABEIAOEA4QMBIgACEQEDEQH/xAAcAAACAgMBAQAAAAAAAAAAAAAFBgMEAAIHAQj/xABEEAACAQMDAgQEAgYHBwQDAAABAgMRAAQFEiExQQYTIlFhFHGBMkIVI6GxwRY0cpKy0fAHM0NSYoKR4RclovFTosLS/8QAGQEAAwEBAQAAAAAAAAAAAAAAAQIDAAYF/8TXpH/qi7//2Q==" alt="طفلة">
    </div>

    <div id="dashboard">
        <div id="start-screen">
            <h1 style="color: var(--deep-blue); font-size: 3rem; margin: 0;">مختبر الموهبة والإبداع</h1>
            <h3 style="color: var(--royal-gold); margin-top: 5px;">بإشراف الأخصائية: صفاء المصري</h3>
            <p style="font-weight: bold; color: #555; font-size: 1.2rem;">تحليل المواقف المعرفية العليا (13 ذكاءً)</p>
            <div style="margin-top: 40px;">
                <input type="text" id="p-name" placeholder="اسم المبدع المتقدم" style="padding:22px; width:75%; border-radius:15px; border:2px solid #ddd; margin:10px; text-align:center; font-size:1.1rem;"><br>
                <input type="text" id="p-class" placeholder="الصف الدراسي" style="padding:22px; width:75%; border-radius:15px; border:2px solid #ddd; margin:10px; text-align:center; font-size:1.1rem;"><br>
                <button class="btn-royal" onclick="begin()">دخول المختبر ⮕</button>
            </div>
        </div>

        <div id="quiz-section">
            <div id="q-text" class="question-card"></div>
            <div id="o-grid" class="options-grid"></div>
            <button id="next-btn" class="btn-royal" style="display:none;" onclick="nextQ()">تحليل الموقف التالي ⮕</button>
        </div>

        <div id="score-section">
            <h2 style="color: var(--royal-gold); font-size: 2rem;">تقرير الموهبة والذكاءات المتعددة</h2>
            <div id="final-info" style="margin-bottom:20px; font-weight:bold; font-size: 1.2rem; color: var(--deep-blue);"></div>
            <h1 id="score-val" style="font-size: 5.5rem; color: var(--deep-blue); margin: 10px 0;"></h1>
            <table class="report-table no-print">
                <thead><tr><th>الموقف المعرفي</th><th>إجابتك</th><th>النتيجة</th></tr></thead>
                <tbody id="res-log"></tbody>
            </table>
            <div class="no-print">
                <button class="btn-royal" onclick="window.print()">طباعة السجل الشامل 🖨️</button>
                <button class="btn-royal" onclick="adminReset()" style="background:#444; color:#fff; margin-right:15px;">محاولة جديدة (برمز الأخصائية) 🔑</button>
            </div>
        </div>
    </div>

<script>
    // نظام الصوت الرقمي المتطور
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playBeep(f) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.value = f; g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.5);
    }

    const quizData = [
        { q: "1. تنجذب لتفكيك الأنظمة والأجهزة المعقدة لاكتشاف خوارزميات عملها الداخلية بدقة عالية:", a: ["نمط حركي/تقني", "استنتاج منطقي", "إدراك بصري", "وعي وجودي"], c: 1 },
        { q: "2. تستطيع كشف مشاعر الآخرين الحقيقية وتوقع أفعالهم من خلال ملاحظة نبرات صوتهم العفوية:", a: ["ذكاء اجتماعي", "ذكاء ذاتي", "ذكاء لغوي", "ذكاء عاطفي"], c: 0 },
        { q: "3. تربط بين أنماط عروق أوراق الشجر ونظام جريان الأنهار في الخرائط الجغرافية بمنظور كوني:", a: ["استنتاج طبيعي", "ذكاء مكاني", "ذكاء رياضي", "ذكاء بصري"], c: 0 },
        { q: "4. تلاحظ الإيقاعات غير المتوقعة في محيطك وتستطيع توظيف 'الصمت' بين الأصوات لخلق معنى إبداعي:", a: ["ذكاء موسيقي", "ذكاء حركي", "ذكاء ذاتي", "ذكاء لغوي"], c: 0 },
        { q: "5. تستخدم الاستعارات اللغوية البليغة لوصف مفاهيم 'مجردة' فلسفية لا يدركها الآخرون بسهولة:", a: ["ذكاء لغوي", "ذكاء اجتماعي", "ذكاء وجودي", "ذكاء بصري"], c: 0 },
        { q: "6. تستطيع 'تدوير' مجسمات معقدة في مخيلتك وتوقع شكل ظلالها قبل سقوط الضوء عليها فعلياً:", a: ["ذكاء مكاني", "ذكاء منطقي", "ذكاء طبيعي", "ذكاء حركي"], c: 0 },
        { q: "7. تمارس النقد المعرفي لقراراتك وتضع استراتيجيات لتحسين وعيك بناءً على مبادئك الأخلاقية الصارمة:", a: ["ذكاء ذاتي", "ذكاء اجتماعي", "ذكاء وجودي", "ذكاء أخلاقي"], c: 0 },
        { q: "8. تشغل بالك أسئلة الوجود الكبرى وتبحث عن غايات الأشياء البعيدة عن المحسوسات المادية:", a: ["ذكاء وجودي", "ذكاء طبيعي", "ذكاء منطقي", "ذكاء ذاتي"], c: 0 },
        { q: "9. تستطيع إيجاد 'الخيط المفقود' والأنماط المعقدة المخفية بين مجموعة بيانات تبدو عشوائية للآخرين:", a: ["ذكاء منطقي/رياضي", "ذكاء لغوي", "ذكاء رقمي", "ذكاء بصري"], c: 0 },
        { q: "10. ترفض الانصياع لسلوك جماعي مبرر اجتماعياً لأنك تمتلك بوصلة قيمية داخلية مستقلة تماماً:", a: ["ذكاء أخلاقي", "ذكاء اجتماعي", "ذكاء وجودي", "ذكاء ذاتي"], c: 0 },
        { q: "11. تبتكر استراتيجيات تعليمية غير تقليدية لتبسيط فكرة علمية صعبة لزملائك باستخدام أساليب المحاكاة:", a: ["ذكاء تعليمي", "ذكاء لغوي", "ذكاء حركي", "ذكاء بصري"], c: 0 },
        { q: "12. تدرك الحالة المزاجية لمن حولك بمجرد دخولك المكان من خلال تحليل 'الصمت' وحركات العيون:", a: ["ذكاء عاطفي/وجداني", "ذكاء مكاني", "ذكاء اجتماعي", "ذكاء ذاتي"], c: 0 },
        { q: "13. تنجذب لفهم 'خوارزميات' التفكير الرقمي وكيفية معالجة وتدفق البيانات خلف الشاشات الذكية:", a: ["ذكاء رقمي", "ذكاء منطقي", "ذكاء حركي", "ذكاء بصري"], c: 0 }
    ];

    let qi = 0, score = 0, resultsLog = [];

    function begin() {
        if(!document.getElementById('p-name').value) return alert("من فضلك أدخلي اسم المبدع للتحليل");
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-section').style.display = 'block';
        loadQ();
    }

    function updateAI(state) {
        const av = document.getElementById('avatar-box');
        if(state === 'happy') {
            av.style.transform = 'scale(1.2) translateY(-20px)';
        } else if(state === 'sad') {
            av.style.transform = 'scale(0.9) rotateX(20deg)';
        } else {
            av.style.transform = 'scale(1) rotateX(0)';
        }
    }

    function loadQ() {
        updateAI('idle');
        const q = quizData[qi];
        document.getElementById('q-text').innerText = q.q;
        const g = document.getElementById('o-grid'); g.innerHTML = '';
        document.getElementById('next-btn').style.display = 'none';

        q.a.forEach((opt, i) => {
            const b = document.createElement('button');
            b.className = 'option-btn'; b.innerText = opt;
            b.onclick = () => check(i, b); g.appendChild(b);
        });
    }

    function check(idx, b) {
        const correct = quizData[qi].c;
        const btns = document.querySelectorAll('.option-btn');
        btns.forEach(btn => btn.style.pointerEvents = 'none');

        let isCorrect = (idx === correct);
        if(isCorrect) {
            b.classList.add('correct'); score++;
            playBeep(880); updateAI('happy');
            confetti({ particleCount: 150, spread: 70, origin: { y: 0.7 } });
        } else {
            if(b) b.classList.add('wrong');
            btns[correct].classList.add('correct');
            playBeep(220); updateAI('sad');
        }

        resultsLog.push({
            q: quizData[qi].q,
            a: quizData[qi].a[idx],
            s: isCorrect ? "✅ صح" : "❌ خطأ"
        });

        document.getElementById('next-btn').style.display = 'inline-block';
    }

    function nextQ() {
        qi++; if(qi < quizData.length) loadQ(); else finish();
    }

    function finish() {
        document.getElementById('quiz-section').style.display = 'none';
        document.getElementById('score-section').style.display = 'block';
        updateAI(score >= 7 ? 'happy' : 'idle');
        
        document.getElementById('final-info').innerHTML = `
            <p><strong>اسم المبدع:</strong> ${document.getElementById('p-name').value}</p>
            <p><strong>الصف الدراسي:</strong> ${document.getElementById('p-class').value}</p>
            <p><strong>تاريخ التحليل المعرفي:</strong> ${new Date().toLocaleDateString('ar-EG')}</p>
            <p><strong>إشراف الأخصائية:</strong> صفاء المصري</p>
        `;

        document.getElementById('score-val').innerText = `${score} / 13`;

        const tableBody = document.getElementById('res-log');
        resultsLog.forEach(res => {
            tableBody.innerHTML += `
                <tr>
                    <td>${res.q}</td>
                    <td>${res.a}</td>
                    <td style="font-weight:bold; color:${res.s.includes('صح') ? '#2ecc71' : '#e74c3c'}">${res.s}</td>
                </tr>
            `;
        });
    }
    
    function adminReset() {
        const pass = prompt("الرمز السري للأخصائية صفاء لبدء محاولة جديدة:");
        if(pass === "1234") {
            location.reload();
        } else if(pass !== null) {
            alert("الرمز غير صحيح.");
        }
    }
</script>
</body>
</html>
